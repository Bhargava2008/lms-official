<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - EduLibrary</title>
    <link rel="stylesheet" href="../../css/login_style.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="welcome-box">
        <h2 class="scroll-text">Welcome to EduLibrary</h2>
      </div>
      <form id="loginForm">
        <div class="input-box">
          <input type="text" id="username" required />
          <label for="username">Username</label>
        </div>
        <div class="input-box">
          <input type="password" id="password" required />
          <label for="password">Password</label>
          <span id="togglePassword" class="toggle-eye">👁️</span>
        </div>
        <a href="forgot-password.html" class="forgot-password"
          >Forgot Password?</a
        >
        <button type="submit" class="btn">Login</button>
      </form>
      <p id="message"></p>
    </div>

    <script src="../../js/login_script.js" defer></script>
    <script src="/js/config.js"></script>
    <script src="login_script.js"></script>
  </body>
</html>
